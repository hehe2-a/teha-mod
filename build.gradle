
tasks.register('collectJars', Copy) {
    dependsOn subprojects.collect { it.tasks.matching { t -> t.name == 'remapJar' } }

    from subprojects.collect { "${it.buildDir}/libs" }
    into "${buildDir}/libs"
    include '*.jar'
    exclude '*-sources.jar'
    exclude '*-dev.jar'
}
tasks.register('build') {
    dependsOn 'collectJars'
}
